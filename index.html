<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Klauthmos">
    <meta name="keywords" content="Klauthmos,NianBroken">
    <meta name="author" content="Klauthmos">
    <title>Klauthmos</title>
    <link rel="apple-touch-icon" href="./public/icons/apple-touch-icon.png">
    <link rel="icon" href="./public/icons/favicon.ico">
    <link rel="stylesheet" href="./src/styles/vendors/iconfont.css">
    <link rel="stylesheet" href="./src/styles/base.css">
    <link rel="stylesheet" href="./src/styles/layout.css">
    <script defer src="./src/scripts/data/site-content.js"></script>
    <script defer src="./src/scripts/app/ui/modal-controller.js"></script>
    <script defer src="./src/scripts/app/ui/entrance.js"></script>
    <script defer src="./src/scripts/app/layout/responsive-layout.js"></script>
    <script defer src="./src/scripts/app/render/profile-content.js"></script>
    <script defer src="./src/scripts/app/sakura-background.js"></script>
    <script defer src="./src/scripts/app/boot.js"></script>
</head>
<body>
    <canvas id="sakura-canvas" class="sakura-canvas" aria-hidden="true"></canvas>

    <main class="page" aria-label="主页内容">
        <section class="page-shell" id="pageShell">
            <div class="avatar-frame static-display entrance-target" data-entrance="avatar">
                <img
                    id="profileAvatar"
                    class="avatar-image"
                    src=""
                    alt="头像"
                    draggable="false"
                >
            </div>

            <h1
                id="profileTitle"
                class="profile-title static-display entrance-target"
                data-entrance="title"
            ></h1>

            <p
                id="profileSubtitle"
                class="profile-subtitle static-display entrance-target"
                data-entrance="subtitle"
            ></p>

            <hr class="profile-divider entrance-target" data-entrance="divider">

            <p
                id="profileDescription"
                class="profile-description static-display entrance-target"
                data-entrance="description"
            ></p>

            <nav
                id="primaryLinks"
                class="links entrance-target"
                data-entrance="links"
                aria-label="主要条目"
            ></nav>

            <nav
                id="socialLinks"
                class="social-links entrance-target"
                data-entrance="social"
                aria-label="底部图标"
            ></nav>
        </section>
    </main>
</body>
</html>
